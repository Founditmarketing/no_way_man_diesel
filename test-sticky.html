<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; }
  .container { height: 2000px; display: flex; flex-direction: column; padding: 50px; background: #eee; }
  .sticky-wrapper { height: 100%; display: flex; align-items: flex-end; justify-content: flex-end; pointer-events: none; }
  .sticky-btn { position: sticky; bottom: 32px; background: red; height: 50px; width: 50px; pointer-events: auto; }
</style>
</head>
<body>
  <div class="container">
    <div class="sticky-wrapper">
       <button class="sticky-btn">X</button>
    </div>
  </div>
  <div style="height: 500px; background: #333;">FOOTER</div>
</body>
</html>
